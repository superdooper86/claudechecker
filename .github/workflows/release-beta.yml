name: Release Beta

on:
  push:
    tags:
      - 'v*-beta*'

jobs:
  release-beta:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          xcodebuild \
            -project ClaudeChecker.xcodeproj \
            -scheme ClaudeChecker \
            -configuration Release \
            -derivedDataPath build \
            clean build

      - name: Zip app
        run: |
          ditto -c -k --keepParent \
            build/Build/Products/Release/ClaudeChecker.app \
            ClaudeChecker.zip

      - name: Create GitHub pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" ClaudeChecker.zip \
            --title "$GITHUB_REF_NAME" \
            --prerelease \
            --notes "$(cat RELEASE_NOTES.md 2>/dev/null || echo 'Beta release ${{ steps.version.outputs.version }}')"

      - name: Update version-beta.json
        run: |
          notes=$(cat RELEASE_NOTES.md 2>/dev/null || echo "Beta release ${{ steps.version.outputs.version }}")
          jq -n \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ClaudeChecker.zip" \
            --arg notes "$notes" \
            '{version: $version, url: $url, notes: $notes}' > version-beta.json

      - name: Update beta badge in README
        run: |
          shields_version=$(echo "${{ steps.version.outputs.version }}" | sed 's/-/--/g')
          tag="${{ github.ref_name }}"
          export BADGE="[![Beta](https://img.shields.io/badge/beta-${shields_version}-orange?style=flat)](https://github.com/${{ github.repository }}/releases/tag/${tag}) <!-- BETA_BADGE -->"
          python3 -c "
          import os
          badge = os.environ['BADGE']
          lines = open('README.md').readlines()
          out = []
          for line in lines:
              out.append(badge + chr(10) if '<!-- BETA_BADGE -->' in line else line)
          open('README.md', 'w').writelines(out)
          "

      - name: Commit version-beta.json and README via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import base64, subprocess, os

          repo = os.environ['GITHUB_REPOSITORY']
          ref_name = os.environ['GITHUB_REF_NAME']
          msg = f'Beta release {ref_name}'

          def api_put(path):
              sha = subprocess.check_output(
                  ['gh', 'api', f'repos/{repo}/contents/{path}', '--jq', '.sha'],
                  text=True
              ).strip()
              content = base64.b64encode(open(path, 'rb').read()).decode()
              subprocess.run([
                  'gh', 'api', '--method', 'PUT',
                  f'repos/{repo}/contents/{path}',
                  '-f', f'message={msg}',
                  '-f', f'content={content}',
                  '-f', f'sha={sha}',
              ], check=True)

          api_put('version-beta.json')
          api_put('README.md')
          PYEOF
